<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathGen — AI Question Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --accent: #f0e14a;
    --accent2: #e8534a;
    --text: #f0efe8;
    --muted: #7a7a8c;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(240,225,74,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,225,74,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  h1 span {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent2);
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
  }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-group.full-width {
    grid-column: 1 / -1;
  }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  select, input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    appearance: none;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .topic-btn {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .topic-btn.selected {
    background: rgba(240,225,74,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .topic-btn:hover:not(.selected) {
    border-color: var(--muted);
    color: var(--text);
  }

  .generate-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .generate-btn:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(240,225,74,0.3);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Output */
  .output {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .output.visible {
    display: flex;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .output-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .clear-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Question cards */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .question-card:hover {
    border-color: var(--border);
  }

  .question-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(240,225,74,0.1);
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .q-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
  }

  .expand-icon {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .question-card.expanded .expand-icon {
    transform: rotate(180deg);
  }

  .solution {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .solution-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    margin: 18px 0 12px;
  }

  .solution-content {
    font-size: 14px;
    line-height: 1.8;
    color: #c8c8d8;
    white-space: pre-wrap;
    font-family: 'Space Mono', monospace;
  }

  .question-card.expanded .solution {
    display: block;
  }

  /* Difficulty badge */
  .diff-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .diff-easy { background: rgba(80,200,120,0.15); color: #50c878; }
  .diff-medium { background: rgba(240,180,50,0.15); color: #f0b432; }
  .diff-hard { background: rgba(232,83,74,0.15); color: var(--accent2); }

  /* Loading */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 16px;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  @media (max-width: 520px) {
    .controls { grid-template-columns: 1fr; }
    .control-group.full-width { grid-column: auto; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">▸ AI-Powered</div>
    <h1>Math<span>Gen</span></h1>
    <div class="subtitle">// instant practice questions, powered by Claude</div>
  </header>

  <div class="controls">
    <div class="control-group full-width">
      <label>Topics</label>
      <div class="topic-grid">
        <button class="topic-btn selected" data-topic="Algebra">Algebra</button>
        <button class="topic-btn selected" data-topic="Geometry">Geometry</button>
        <button class="topic-btn selected" data-topic="Arithmetic">Arithmetic</button>
        <button class="topic-btn selected" data-topic="Trigonometry">Trigonometry</button>
        <button class="topic-btn" data-topic="Statistics">Statistics</button>
        <button class="topic-btn" data-topic="Polynomials">Polynomials</button>
        <button class="topic-btn" data-topic="Mensuration">Mensuration</button>
        <button class="topic-btn" data-topic="Number Theory">Number Theory</button>
      </div>
    </div>

    <div class="control-group">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="Easy">Easy</option>
        <option value="Medium" selected>Medium</option>
        <option value="Hard">Hard</option>
        <option value="Mixed">Mixed</option>
      </select>
    </div>

    <div class="control-group">
      <label>Number of Questions</label>
      <input type="number" id="count" value="5" min="1" max="10">
    </div>

    <div class="control-group full-width">
      <label>Class Level</label>
      <select id="level">
        <option value="Class 8">Class 8</option>
        <option value="Class 9">Class 9</option>
        <option value="Class 10" selected>Class 10</option>
        <option value="Class 11-12">Class 11–12</option>
      </select>
    </div>

    <div class="control-group full-width">
      <button class="generate-btn" id="generateBtn" onclick="generate()">
        ▶ Generate Questions
      </button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Generating questions...</div>
  </div>

  <div class="output" id="output">
    <div class="output-header">
      <div class="output-title">Generated Questions</div>
      <button class="clear-btn" onclick="clearOutput()">✕ Clear</button>
    </div>
    <div id="questionList"></div>
  </div>
</div>

<script>
  // Topic selection
  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
    });
  });

  function getSelectedTopics() {
    return [...document.querySelectorAll('.topic-btn.selected')].map(b => b.dataset.topic);
  }

  async function generate() {
    const topics = getSelectedTopics();
    if (topics.length === 0) return alert('Please select at least one topic.');

    const difficulty = document.getElementById('difficulty').value;
    const count = Math.min(10, Math.max(1, parseInt(document.getElementById('count').value) || 5));
    const level = document.getElementById('level').value;

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('loading').classList.add('visible');
    document.getElementById('output').classList.remove('visible');

    const prompt = `Generate exactly ${count} math practice questions for a ${level} student.
Topics: ${topics.join(', ')}
Difficulty: ${difficulty}

Return ONLY a JSON array. No preamble, no markdown fences. Example format:
[
  {
    "question": "Find x if 2x + 5 = 13",
    "difficulty": "Easy",
    "topic": "Algebra",
    "solution": "2x = 13 - 5\\n2x = 8\\nx = 4"
  }
]

Rules:
- Each object must have: question, difficulty, topic, solution
- solution must be a clear step-by-step working (use \\n for line breaks)
- difficulty must be Easy, Medium, or Hard
- Questions should be numerical/computational, not theory
- No markdown in solution, just plain text steps`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const questions = JSON.parse(clean);
      renderQuestions(questions);
    } catch (e) {
      alert('Something went wrong. Please try again.');
      console.error(e);
    } finally {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('loading').classList.remove('visible');
    }
  }

  function renderQuestions(questions) {
    const list = document.getElementById('questionList');
    list.innerHTML = '';

    questions.forEach((q, i) => {
      const diff = (q.difficulty || 'Medium').toLowerCase();
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="question-head" onclick="toggleCard(this)">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-text">${q.question}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="diff-badge diff-${diff}">${q.difficulty || 'Medium'}</span>
            <span class="expand-icon">▾</span>
          </div>
        </div>
        <div class="solution">
          <div class="solution-label">▸ Solution</div>
          <div class="solution-content">${(q.solution || '').replace(/\\n/g, '\n')}</div>
        </div>
      `;
      list.appendChild(card);
    });

    document.getElementById('output').classList.add('visible');
  }

  function toggleCard(head) {
    const card = head.parentElement;
    card.classList.toggle('expanded');
  }

  function clearOutput() {
    document.getElementById('output').classList.remove('visible');
    document.getElementById('questionList').innerHTML = '';
  }
</script>
</body>
</html>
